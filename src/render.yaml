services:
  - type: web
    name: qoscollab-ml-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn ml_service:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://your-frontend-domain.com
      - key: MODEL_PATH
        value: qos_model.pkl
      - key: SCALER_PATH
        value: scaler.pkl
